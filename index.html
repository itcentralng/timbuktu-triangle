<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Timbuktu Triangle — Nigerian Army</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="stage-wrapper" id="stage-wrapper">
    <div class="stage" id="stage">

      <!-- ============ LOOPING BACKGROUND VIDEO ============ -->
      <div class="app-bg-video-wrap" aria-hidden="true">
        <video class="app-bg-video" autoplay muted loop playsinline>
          <source src="assets/videos/background-loop.mp4" type="video/mp4" />
        </video>
        <div class="app-bg-video-overlay"></div>
      </div>

      <!-- ============ PERSISTENT TOP BAR ============ -->
      <header class="topbar hidden" id="topbar">
        <button class="icon-btn" id="btn-home" aria-label="Home">
          <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5" /><path d="M5.5 10v9a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9" /><path d="M9.5 20v-6h5v6" /></svg>
        </button>
        <div style="display: flex; align-items: center; gap: 12px;">
          <div class="attract-logo"><img src="assets/icons/army.png" alt="" style="width: 40px; height: 40px; border-radius: 8px;"/></div>
          <div class="topbar-title" id="topbar-title">The Timbuktu Triangle</div>
        </div>
        <div class="topbar-right">
          <div class="lang-switch" id="lang-switch">
            <button data-lang="en">EN</button>
            <button data-lang="fr">FR</button>
            <button data-lang="ar">AR</button>
          </div>
          <button class="kiosk-close" id="btn-close" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
      </header>

      <!-- ============ SCREENS ============ -->
      <main id="screens">

        <!-- ATTRACT -->
        <section class="screen active" id="screen-attract">
          <div class="attract-bg"></div>
          <div class="attract-grain"></div>
          <div class="attract-content">
            <div class="attract-logo"><img src="assets/icons/army.png" alt="" style="width: 80px; height: 80px; border-radius: 12px;"/></div>
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="attract-crest" style="width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 24px;"><svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,2 20.5,17 3.5,17"/></svg></div>
              <h1 class="attract-title">THE TIMBUKTU TRIANGLE</h1>
            </div>
            <p class="attract-sub">NIGERIAN ARMY &mdash; OPERATIONS DESERT SANITY IV &amp; V</p>
            <div class="attract-lang-select">
              <p class="attract-lang-select-label">Select your language &middot; <span dir="rtl">اختر لغتك</span> &middot; Choisissez votre langue</p>
              <div class="attract-lang-pills">
                <button class="attract-lang-pill" data-lang="en">
                  <span class="attract-lang-pill-name">English</span>
                </button>
                <button class="attract-lang-pill" data-lang="fr">
                  <span class="attract-lang-pill-name">Français</span>
                </button>
                <button class="attract-lang-pill" data-lang="ar" dir="rtl">
                  <span class="attract-lang-pill-name">العربية</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- HOME / MAIN MENU -->
        <section class="screen" id="screen-home">
          <div class="home-header">
            <div class="home-crest"><svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,2 20.5,17 3.5,17"/></svg></div>
            <h1 class="home-title" data-i18n="appTitle"></h1>
            <p class="home-sub" data-i18n="appSubtitle"></p>
          </div>
          <nav class="menu-grid">
            <button class="menu-tile menu-tile--about" data-nav="about">
              <span class="menu-tile-icon">
                <svg viewBox="0 0 24 24"><path d="M4 19.5V6a2 2 0 0 1 2-2h13v15.5" /><path d="M6 4v16h13" /><path d="M8 8h8M8 12h6" /></svg>
                <img src="assets/icons/about.png" alt="" onerror="this.remove()" />
              </span>
              <span class="menu-tile-text">
                <span class="menu-tile-title" data-i18n="menuAbout"></span>
                <span class="menu-tile-sub" data-i18n="menuAboutSub"></span>
              </span>
            </button>
            <button class="menu-tile menu-tile--doc" data-nav="documentary">
              <span class="menu-tile-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="1.5"/><path d="m16.5 10 4.5-2.8v9.6l-4.5-2.8" /></svg>
                <img src="assets/icons/documentary.png" alt="" onerror="this.remove()" />
              </span>
              <span class="menu-tile-text">
                <span class="menu-tile-title" data-i18n="menuDocumentary"></span>
                <span class="menu-tile-sub" data-i18n="menuDocumentarySub"></span>
              </span>
            </button>
            <button class="menu-tile menu-tile--news" data-nav="news">
              <span class="menu-tile-icon">
                <svg viewBox="0 0 24 24"><path d="M4 5h13v14a1.5 1.5 0 0 0 1.5 1.5H6A2 2 0 0 1 4 18.5V5Z"/><path d="M17 5h3v13.5a1.5 1.5 0 0 1-3 0V5Z"/><path d="M7 8.5h7M7 11.5h7M7 14.5h4"/></svg>
                <img src="assets/icons/news.png" alt="" onerror="this.remove()" />
              </span>
              <span class="menu-tile-text">
                <span class="menu-tile-title" data-i18n="menuNews"></span>
                <span class="menu-tile-sub" data-i18n="menuNewsSub"></span>
              </span>
            </button>
            <button class="menu-tile menu-tile--tribute" data-nav="tribute">
              <span class="menu-tile-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 20C8 19 4 15 4 9" />
                  <path d="M12 20C16 19 20 15 20 9" />
                  <path d="M10.5 18.5 7.5 17.3" />
                  <path d="M7.5 15.5 4.3 14.6" />
                  <path d="M5.5 12 2.2 11.5" />
                  <path d="M4.3 8.5 1.3 7.6" />
                  <path d="M13.5 18.5 16.5 17.3" />
                  <path d="M16.5 15.5 19.7 14.6" />
                  <path d="M18.5 12 21.8 11.5" />
                  <path d="M19.7 8.5 22.7 7.6" />
                </svg>
                <img src="assets/icons/tribute.png" alt="" onerror="this.remove()" />
              </span>
              <span class="menu-tile-text">
                <span class="menu-tile-title" data-i18n="menuTribute"></span>
                <span class="menu-tile-sub" data-i18n="menuTributeSub"></span>
              </span>
            </button>
          </nav>
        </section>

        <!-- ABOUT -->
        <section class="screen" id="screen-about">
          <div class="about-wrap">
            <div class="about-header">
              <h2 class="about-title" id="about-title"></h2>
              <div class="about-progress" id="about-progress"></div>
            </div>

            <div class="about-main">
              <div class="about-map-col">
                <img src="assets/images/triangle-map.png" alt="" onerror="this.remove()" />
              </div>
              <div class="about-text-col">
                <div class="about-paragraph-wrap">
                  <p class="about-paragraph" id="about-paragraph"></p>
                </div>
              </div>
            </div>

            <div class="about-controls">
              <button class="round-btn" id="about-prev" aria-label="Previous">
                <svg viewBox="0 0 24 24"><path d="M15 6 9 12l6 6"/></svg>
              </button>
              <button class="listen-btn" id="about-listen">
                <svg class="icon-play" viewBox="0 0 24 24"><path d="M7 5v14l12-7Z"/></svg>
                <svg class="icon-pause hidden" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
                <span class="listen-label" data-i18n="listen"></span>
              </button>
              <button class="round-btn" id="about-next" aria-label="Next">
                <svg viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg>
              </button>
            </div>
          </div>
        </section>

        <!-- DOCUMENTARY TIME PICKER -->
        <section class="screen" id="screen-documentary">
          <div class="doc-wrap">
            <h2 class="doc-title" data-i18n="howMuchTime"></h2>
            <p class="doc-sub" data-i18n="howMuchTimeSub"></p>
            <div class="doc-list" id="doc-list"></div>
          </div>
        </section>

        <!-- NEWS LIST -->
        <section class="screen" id="screen-news">
          <div class="news-wrap">
            <p class="news-intro" data-i18n="newsIntro"></p>
            <div class="news-filter" id="news-filter">
              <button class="news-filter-btn active" data-filter="all" data-i18n="newsFilterAll"></button>
              <button class="news-filter-btn" data-filter="IV" data-i18n="operationIV"></button>
              <button class="news-filter-btn" data-filter="V" data-i18n="operationV"></button>
            </div>
            <div class="news-grid" id="news-grid"></div>
          </div>
        </section>

        <!-- NEWS ARTICLE READER -->
        <section class="screen" id="screen-article">
          <button class="article-back" id="article-back">
            <svg viewBox="0 0 24 24"><path d="M15 6 9 12l6 6"/></svg>
            <span data-i18n="back"></span>
          </button>
          <div class="article-scroll" id="article-scroll" dir="ltr">
            <div class="article-masthead" id="article-masthead">
              <span class="article-logo" id="article-logo"></span>
              <span class="article-outlet" id="article-outlet"></span>
            </div>
            <div class="article-hero" id="article-hero"></div>
            <div class="article-body-wrap">
              <h2 class="article-headline" id="article-headline"></h2>
              <p class="article-dek" id="article-dek"></p>
              <div class="article-meta" id="article-meta"></div>
              <div class="article-body" id="article-body"></div>
              <div class="article-footer" id="article-footer"></div>
            </div>
          </div>
        </section>

        <!-- TRIBUTE / FALLEN HEROES -->
        <section class="screen" id="screen-tribute">
          <div class="tribute-wrap">
            <div class="tribute-header">
              <div class="tribute-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 20C8 19 4 15 4 9" />
                  <path d="M12 20C16 19 20 15 20 9" />
                  <path d="M10.5 18.5 7.5 17.3" />
                  <path d="M7.5 15.5 4.3 14.6" />
                  <path d="M5.5 12 2.2 11.5" />
                  <path d="M4.3 8.5 1.3 7.6" />
                  <path d="M13.5 18.5 16.5 17.3" />
                  <path d="M16.5 15.5 19.7 14.6" />
                  <path d="M18.5 12 21.8 11.5" />
                  <path d="M19.7 8.5 22.7 7.6" />
                </svg>
                <img src="assets/icons/tribute.png" alt="" onerror="this.remove()" />
              </div>
              <h2 class="tribute-title" data-i18n="menuTribute"></h2>
              <p class="tribute-intro" data-i18n="tributeIntro"></p>
            </div>
            <div class="tribute-filter" id="tribute-filter">
              <button class="tribute-filter-btn active" data-filter="IV" data-i18n="tributeIV"></button>
              <button class="tribute-filter-btn" data-filter="V" data-i18n="tributeV"></button>
            </div>
            <div class="tribute-organogram" id="tribute-organogram"></div>
          </div>
        </section>

      </main>

      <!-- ============ VIDEO PLAYER OVERLAY ============ -->
      <div class="video-overlay hidden" id="video-overlay">
        <video id="video-player" playsinline></video>
        <div class="video-top-controls">
          <button class="icon-btn video-close" id="video-close" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="video-bottom-controls">
          <button class="icon-btn" id="video-playpause" aria-label="Play/Pause">
            <svg class="icon-play" viewBox="0 0 24 24"><path d="M7 5v14l12-7Z"/></svg>
            <svg class="icon-pause hidden" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
          </button>
          <span class="video-time" id="video-time-current">0:00</span>
          <input type="range" class="video-scrub" id="video-scrub" min="0" max="100" value="0" />
          <span class="video-time" id="video-time-duration">0:00</span>
        </div>
      </div>

      <!-- IDLE OVERLAY -->
      <div class="idle-overlay hidden" id="idle-overlay">
        <span data-i18n="idleReturnNote"></span>
      </div>

    </div>
  </div>

  <script src="data/content.js"></script>
  <script src="data/kia.js"></script>
  <script src="data/news-articles.js"></script>
  <script src="data/outlet-logos.js"></script>
  <script src="script.js"></script>
</body>
</html>
